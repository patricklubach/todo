<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ToDo</title>

    <link rel="stylesheet" href="./public/style.css">

  </head>

  <body>
    <h1>ToDo List</h1>


    <div class="todo add-todo">
      <form>
        <!-- <label for="title">Enter your todo</label> -->
        <input id="title" type="text" required="" placeholder="Enter your title">
        <input id="description" type="text" placeholder="Enter your description">
        <input type="submit" value="Add" class="add-button done-button">
      </form>
    </div>
    <div id=todos>
        <div class="todo">
          <h3>Todo #1</h3>
          <p>This is my todo</p>
          <button class="done-button">Done</button>
          <button class="delete-button">Delete</button>
        </div>
        <div class="todo">
          <h3>Todo #2</h3>
          <p>This is my todo</p>
          <button class="done-button">Done</button>
          <button class="delete-button">Delete</button>
        </div>
        <div class="todo">
          <h3>Todo #3</h3>
          <p>This is my todo</p>
          <button class="done-button">Done</button>
          <button class="delete-button">Delete</button>
        </div>

      </div>
  </body>

</html>
